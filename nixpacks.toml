[phases.setup]
nixPkgs = ["python311Full", "gcc", "libffi", "openssl", "pkg-config", "postgresql"]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r snapreply/requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "cd snapreply && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT"
