[phases.setup]
nixPkgs = ["python311Full", "gcc", "libffi", "openssl", "pkg-config", "postgresql"]

[phases.install]
cmds = [
  "python3.11 -m ensurepip --upgrade",
  "python3.11 -m pip install -r snapreply/requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "cd snapreply && uvicorn main:app --host 0.0.0.0 --port $PORT"
